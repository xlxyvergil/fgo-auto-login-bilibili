; ======================
; 多模拟器自动化配置
; 支持：MuMu、雷电、夜神、蓝叠等
; ======================

[Emulator]
; 模拟器名称（用于查找实例编号，通用模式可不填）
name = kuku
; ADB设备地址 IP:端口
ip_port = 127.0.0.1:16416

[Paths]
; 模拟器管理器路径（根据模拟器类型自动识别）
; 支持的模拟器及路径示例：
; MuMu: G:\MuMu\nx_main\MuMuManager.exe
; 雷电: G:\leidian\LDPlayer9\ldconsole.exe  
; 夜神: G:\Nox\bin\NoxConsole.exe
; 蓝叠: G:\BlueStacks_nxt\HD-Player.exe
; 通用模式: 留空或删除此行
emulator_manager = G:\MuMu\nx_main\MuMuManager.exe

[Steps]
; 点击配置格式: x坐标 y坐标 点击次数 延迟(秒)
; 按键配置格式: KEYCODE_xxx 按键次数 延迟(秒)

; 进入游戏点击 (点击1次)
tap_enter_game = 533 133 1

; 登录点击 (点击1次)
tap_login = 533 133 1

; 返回键 (点击1次)
tap_back = KEYCODE_BACK 1

; 侧边栏防护 (点击5次)
tap_side = 67 333 5

; 点击体力条 (点击1次)
tap_energy = 253 693 1

; 点击种树 (点击1次)
tap_plant = 900 633 1

; 点击加号 (点击5次)
tap_plus = 907 300 5

; 点击交换按钮 (点击1次)
tap_swap_btn = 813 600 1

; 关闭交换 (点击1次)
tap_close_swap = 647 560 1

; 返回主界面 (点击1次)
tap_back_main = 647 613 1

[Delays]
; ADB连接超时时间（秒）
adb_timeout = 60

; ADB连接检测间隔（秒）
adb_interval = 5

; 获取模拟器信息后等待时间（秒）
post_get_instance = 5

; 启动模拟器后等待时间（秒）
post_launch_emulator = 5

; 启动游戏后等待时间（秒）
post_launch = 40

; 步骤间基础间隔（秒）
step_base = 5

; 点击间隔（多次点击时，点击之间的延迟）
click_interval = 1

; 进入游戏点击与登录点击之间的间隔（秒）
enter_login_interval = 40
