; ======================
; MuMu模拟器自动化配置
; ======================

[Emulator]
; 模拟器名称（用于查找实例编号）
name = kuku
; ADB设备地址 IP:端口
ip_port = 127.0.0.1:16416

[Paths]
; MuMu模拟器管理器路径
muemu_manager = G:\MuMu\nx_main\MuMuManager.exe

[Game]
; FGO包名和活动名
package = com.bilibili.fatego
activity = .UnityPlayerNativeActivity

[Steps]
; 点击配置格式: x坐标 y坐标 点击次数 延迟(秒)
; 按键配置格式: KEYCODE_xxx 按键次数 延迟(秒)

; 进入游戏点击 (点击1次，延迟1秒)
tap_enter_game = 800 200 1 20

; 登录点击 (点击1次，延迟1秒)
tap_login = 800 200 1 20

; 返回键 (点击1次，延迟0.5秒)
tap_back = KEYCODE_BACK 1 10

; 侧边栏防护 (点击5次，每次间隔0.5秒)
tap_side = 100 500 5 10

; 点击体力条 (点击1次，延迟0.5秒)
tap_energy = 380 1040 1 10

; 点击种树 (点击1次，延迟1秒)
tap_plant = 1350 950 1 10

; 点击加号 (点击5次，每次间隔0.5秒)
tap_plus = 1360 450 5 5

; 点击交换按钮 (点击1次，延迟0.5秒)
tap_swap_btn = 1220 900 1 10

; 关闭交换 (点击1次，延迟0.5秒)
tap_close_swap = 970 840 1 10

; 返回主界面 (点击1次，延迟0.5秒)
tap_back_main = 970 920 1 10

[Delays]
; ADB连接超时时间（秒）
adb_timeout = 60

; ADB连接检测间隔（秒）
adb_interval = 5

; 启动游戏后等待时间（秒）
post_launch = 30

; 步骤间基础间隔（秒）
step_base = 0.5